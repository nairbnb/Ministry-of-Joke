openapi: 3.0.0
info:
  title: Ministry of Jokes API
  version: "1.0"
paths:
  /api/v1/jokes/count:
    get:
      summary: Returns total joke count
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      count:
                        type: integer
                  status:
                    type: string
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string

